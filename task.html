<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jumping ball</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
        }

        .ball {
            height: 60px;
            width: 60px;
            position: absolute;
            border-radius: 50%;
            top: 86vh;
            margin: 15px;
            animation: move 15s 5 linear;
            text-align: center;


        }

        @keyframes move {
            50% {
                top: 5vh;
                scale: 2;

            }

            51% {
                scale: 1;
                
            }
           
            100% {
                top: 86vh;


            }
        }

        .ball2 {
            height: 60px;
            width: 60px;
            position: absolute;
            border-radius: 50%;
            top: 86vh;
            left: 90vw;
            margin: 15px;
            animation: move 15s 5 linear;
            text-align: center;

        }

        .b1 {
