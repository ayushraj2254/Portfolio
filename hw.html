<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mario game</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
        }

        .mario {
            height: 100px;
            width: 100px;
            position: absolute;
            bottom: 65px;
            animation: run 10s infinite linear;

        }

        @keyframes  run{
            0% {
                bottom: 65px;
                left:0%;
            }
        75%{
                left: 70vw;
                bottom: 65px;
            }
76%{
    bottom: 150px;
}
84%{
    left:84vw;
    bottom: 65px;
}
            100% {
                bottom: 65px;
                left: 100vw;
            }

        }

        img {
            height: 100%;
            width: 100%;
            /* background-color: transparent; */
        }

        body {
            height: 100vh;
            width: 100vw;
        }

        .main {
            height: 100%;
            width: 100%;
        }
        h1{
            position: absolute;
            top:10vh;
            left:45vw;
            font-family: cursive ;
            animation: big 10s infinite linear;
            color: aliceblue;
        }
        @keyframes big{
            0%{
                transform:scale(1)
            }
            
            
            100%{
                transform: scale(5);
                
            }
        }
    </style>
</head>

<body>
    <div class="main">
        <img src="mariowalll.jpg" alt="wall">
        <div class="mario">
            <img src="mario_no_bg.gif" alt="mario">
        </div>
    </div>
    <h1>MARIO RUN</h1>

</body>

</html>
